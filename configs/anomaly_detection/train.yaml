  target: target
split:
  strategy: random
  valid_size: 0.2
  test_size: 0.2
model:
  backend: sklearn
  name: isolation_forest
  params:
    contamination: 0.1
feature_pipeline:
  - name: numeric_only
    params: {}
tune:
  enabled: false
