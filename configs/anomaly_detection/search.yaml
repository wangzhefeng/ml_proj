task: anomaly_detection
artifact_root: artifacts
source:
  type: csv
  path: dataset/anomaly_detection/train.csv
  target: target
split:
  strategy: random
  valid_size: 0.2
  test_size: 0.2
model:
  backend: sklearn
  name: isolation_forest
  params: {}
feature_pipeline:
  - name: numeric_only
    params: {}
tune:
  enabled: true
  method: random
  n_iter: 5
  cv_folds: 4
  scoring: null
  param_grid:
    contamination: [0.05, 0.1, 0.15]
    n_estimators: [100, 150, 200]
