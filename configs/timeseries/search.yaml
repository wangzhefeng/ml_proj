task: timeseries
artifact_root: artifacts
source:
  type: csv
  path: dataset/timeseries/train.csv
  target: target
split:
  strategy: timeseries
  valid_size: 0.2
  test_size: 0.2
model:
  name: random_forest
  params: {}
tune:
  enabled: true
  method: grid
  cv_folds: 5
  scoring: neg_root_mean_squared_error
  param_grid:
    n_estimators: [100, 200]
    max_depth: [5, 10]
